services:
  - type: web
    name: darkmoorai-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: ENV
        value: production
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: darkmoorai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: darkmoorai-redis
          type: redis
          property: connectionString

  - type: redis
    name: darkmoorai-redis
    plan: free

databases:
  - name: darkmoorai-db
    plan: free